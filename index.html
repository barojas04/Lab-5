<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App Premium</title>
  <meta name="description" content="Una aplicación de gestión de tareas premium y moderna.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <main class="app">
    <section class="todo-container glass-panel">
      <header class="app-header">
        <h1>Mis Tareas</h1>
        <div class="task-stats">
          <p>Pendientes: <span id="pendingCount" class="badge badge-warning">0</span></p>
          <p>Completadas: <span id="completedCount" class="badge badge-success">0</span></p>
        </div>
      </header>

      <form id="taskForm" class="task-form">
        <div class="input-group">
          <span class="material-symbols-rounded input-icon">add_task</span>
          <input type="text" id="taskInput" placeholder="¿Qué necesitas hacer hoy?" aria-label="Nueva tarea"
            autocomplete="off">
          <button type="submit" class="btn-primary" aria-label="Agregar tarea">
            <span class="material-symbols-rounded">add</span>
          </button>
        </div>
      </form>

      <p id="errorMessage" class="error-message"></p>

      <div class="list-header">
        <h2>Tus Tareas</h2>
        <button id="clearCompletedBtn" class="btn-text">Limpiar completadas</button>
      </div>

      <ul id="taskList" class="task-list">
        <!-- Tareas dinámicas -->
      </ul>

      <div id="emptyState" class="empty-state hidden">
        <span class="material-symbols-rounded empty-icon">done_all</span>
        <p>¡Todo listo! No tienes tareas pendientes.</p>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>

</html>
